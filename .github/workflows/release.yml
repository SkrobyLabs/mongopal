name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  actions: read

jobs:
  build:
    uses: ./.github/workflows/build.yml
    with:
      publish: true
      version: ${{ github.ref_name }}

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release notes
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          version="${TAG#v}"
          gh api "repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
            -f tag_name="$TAG" \
            -q .body > notes.md
          cat >> notes.md <<EOF

          ## Downloads

          | Platform | Artifact |
          | --- | --- |
          | Linux amd64 | MongoPal-linux-amd64.zip |
          | Windows amd64 | MongoPal-windows-amd64.zip |
          | macOS amd64 | MongoPal-macos-amd64.zip |
          | macOS arm64 | MongoPal-macos-arm64.zip |

          Runtime version metadata for this release is \`${version}\`.
          macOS artifacts are unsigned and not notarized.
          EOF

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: gh release create "$TAG" --title "$TAG" -F notes.md artifacts/*/*.zip
